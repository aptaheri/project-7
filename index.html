<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>project-7</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Apply saved font before first paint to avoid flash -->
    <script>
      (function () {
        var saved = localStorage.getItem('p7-font');
        var stacks = {
          'tt-norms': "'TT Norms Pro', system-ui, sans-serif",
          'inter': "'Inter', system-ui, sans-serif",
          'nunito': "'Nunito Sans', system-ui, sans-serif",
        };
        var stack = stacks[saved] || stacks['tt-norms'];
        document.documentElement.style.setProperty('--font-sans', stack);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
